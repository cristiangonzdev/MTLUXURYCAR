<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Leads · MT Lux Cars Admin</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #060606;
    --black-soft: #0F0F0F;
    --black-card: #141414;
    --gold: #C9A84C;
    --gold-light: #E4C97A;
    --cream: #F0EAD6;
    --cream-soft: #D4CCBA;
    --gray: #888880;
    --line: rgba(201,168,76,.15);
    --line-strong: rgba(201,168,76,.3);
    --red: #c25151;
    --amber: #d49d3d;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: var(--gold); text-decoration: none; }
  a:hover { color: var(--gold-light); }
  button { font-family: inherit; cursor: pointer; }

  /* Header */
  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--line);
    background: var(--black-soft);
  }
  .brand {
    display: flex; flex-direction: column;
  }
  .brand-name {
    font-family: Georgia, serif; font-size: 1.1rem;
    color: var(--gold); letter-spacing: .04em;
  }
  .brand-sub { font-size: .65rem; color: var(--gray); letter-spacing: .2em; text-transform: uppercase; }
  .topbar-actions { display: flex; gap: .8rem; align-items: center; }
  .btn-link {
    background: none; border: 1px solid var(--line);
    color: var(--cream-soft); padding: .5rem .9rem;
    font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
  }
  .btn-link:hover { border-color: var(--gold); color: var(--gold); }

  /* Main */
  main { padding: 1.5rem; max-width: 1500px; margin: 0 auto; }

  /* Stats */
  .stats {
    display: grid; gap: .8rem; margin-bottom: 1.5rem;
    grid-template-columns: repeat(4, 1fr);
  }
  @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .stats { grid-template-columns: 1fr; } }
  .stat-card {
    background: var(--black-card); border: 1px solid var(--line);
    padding: 1rem 1.1rem;
  }
  .stat-label { font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: var(--gray); margin-bottom: .35rem; }
  .stat-value { font-family: Georgia, serif; font-size: 1.7rem; color: var(--cream); line-height: 1.1; }
  .stat-sub { font-size: .72rem; color: var(--gray); margin-top: .2rem; font-style: italic; }
  .stat-value.alert { color: var(--red); }

  /* Filters */
  .filters {
    background: var(--black-soft); border: 1px solid var(--line);
    padding: .9rem 1rem; margin-bottom: 1rem;
    display: flex; flex-wrap: wrap; gap: .6rem; align-items: center;
  }
  .tab-row { display: flex; flex-wrap: wrap; gap: .35rem; }
  .tab {
    padding: .4rem .8rem; background: transparent;
    border: 1px solid var(--line); color: var(--cream-soft);
    font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
  }
  .tab:hover { border-color: var(--line-strong); }
  .tab.active { background: var(--gold); color: var(--black); border-color: var(--gold); }
  .filters-divider { width: 1px; height: 24px; background: var(--line); margin: 0 .3rem; }
  .chip {
    padding: .35rem .7rem; background: transparent;
    border: 1px solid var(--line); color: var(--cream-soft);
    font-size: .68rem; letter-spacing: .06em;
    border-radius: 14px;
  }
  .chip.active { background: rgba(201,168,76,.12); color: var(--gold); border-color: var(--gold); }
  .filters input[type="search"], .filters select {
    background: rgba(255,255,255,.03); border: 1px solid var(--line);
    color: var(--cream); padding: .45rem .7rem;
    font-size: .82rem; font-family: inherit; min-height: 32px;
  }
  .filters input[type="search"]:focus, .filters select:focus {
    outline: none; border-color: var(--gold); background: rgba(255,255,255,.05);
  }
  .filters input[type="search"] { min-width: 200px; }

  /* Table */
  .table-wrap { overflow-x: auto; background: var(--black-soft); border: 1px solid var(--line); }
  table.leads {
    width: 100%; border-collapse: collapse; font-size: .85rem;
  }
  table.leads th {
    text-align: left; padding: .7rem .8rem;
    background: var(--black-card); color: var(--cream-soft);
    font-size: .68rem; letter-spacing: .14em; text-transform: uppercase;
    font-weight: 500; border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  table.leads td {
    padding: .7rem .8rem; border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  table.leads tr { transition: background .2s ease; }
  table.leads tr:hover td { background: rgba(255,255,255,.02); cursor: pointer; }
  .col-date { white-space: nowrap; color: var(--gray); font-size: .78rem; }
  .col-vehicle { min-width: 180px; }
  .vehicle-name { color: var(--cream); display: block; }
  .vehicle-price { color: var(--gold); font-size: .78rem; }
  .col-contact a { display: block; font-size: .8rem; }
  .col-contact .email { color: var(--cream); }
  .col-contact .phone { color: var(--gray); margin-top: .15rem; font-size: .76rem; }
  .badge {
    display: inline-block; padding: .15rem .55rem; border-radius: 10px;
    font-size: .65rem; letter-spacing: .08em; text-transform: uppercase;
  }
  .badge-immediate { background: rgba(194,81,81,.18); color: var(--red); }
  .badge-short_term { background: rgba(212,157,61,.18); color: var(--amber); }
  .badge-exploring { background: rgba(136,136,128,.2); color: var(--gray); }
  select.status-select {
    background: rgba(255,255,255,.03); border: 1px solid var(--line);
    color: var(--cream); padding: .25rem .4rem; font-size: .75rem; font-family: inherit;
  }
  .empty {
    padding: 3rem 1rem; text-align: center; color: var(--gray);
    font-size: .9rem; font-style: italic;
  }
  .pager {
    display: flex; justify-content: space-between; align-items: center;
    padding: .8rem 1rem; border-top: 1px solid var(--line);
    background: var(--black-card); font-size: .78rem; color: var(--gray);
  }
  .pager button {
    background: transparent; border: 1px solid var(--line);
    color: var(--cream-soft); padding: .35rem .8rem; font-size: .72rem;
  }
  .pager button:disabled { opacity: .4; cursor: not-allowed; }
  .pager button:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }

  /* Drawer */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 100; opacity: 0; visibility: hidden; transition: opacity .25s ease, visibility .25s ease;
  }
  .drawer-overlay.open { opacity: 1; visibility: visible; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 100%; max-width: 480px;
    background: var(--black-soft); border-left: 1px solid var(--line);
    z-index: 101; transform: translateX(100%);
    transition: transform .3s ease;
    overflow-y: auto; padding: 1.5rem;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; color: var(--cream-soft);
    font-size: 1.5rem; line-height: 1;
  }
  .drawer-section { margin-bottom: 1.5rem; }
  .drawer-section h3 {
    font-size: .68rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: .5rem; font-weight: 500;
  }
  .drawer-section p { font-size: .9rem; color: var(--cream); }
  .drawer-section .muted { color: var(--gray); font-size: .8rem; word-break: break-all; }
  .drawer-actions { display: grid; gap: .5rem; grid-template-columns: 1fr 1fr; margin-bottom: 1rem; }
  .drawer-actions a, .drawer-actions button {
    padding: .65rem; text-align: center; background: transparent;
    border: 1px solid var(--gold); color: var(--gold);
    font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
    text-decoration: none;
  }
  .drawer-actions a:hover, .drawer-actions button:hover {
    background: var(--gold); color: var(--black);
  }
  textarea.notes {
    width: 100%; min-height: 120px; padding: .7rem;
    background: rgba(255,255,255,.03); border: 1px solid var(--line);
    color: var(--cream); font-family: inherit; font-size: .9rem;
    resize: vertical;
  }
  textarea.notes:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,.05); }
  .save-notes {
    margin-top: .5rem; padding: .55rem 1rem;
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold); font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
  }
  .save-notes:hover { background: var(--gold); color: var(--black); }
  .save-notes.saved { color: #6ec991; border-color: #6ec991; }

  .loader { padding: 3rem; text-align: center; color: var(--gray); }
  .loader-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    background: var(--gold); margin: 0 3px; animation: pulse 1s infinite ease-in-out; }
  .loader-dot:nth-child(2) { animation-delay: .15s; }
  .loader-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: .3; } 40% { opacity: 1; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-name">MT Lux Cars</span>
    <span class="brand-sub">Panel de leads</span>
  </div>
  <div class="topbar-actions">
    <button class="btn-link" id="refreshBtn">Actualizar</button>
    <button class="btn-link" id="logoutBtn">Salir</button>
  </div>
</header>

<main>
  <section class="stats" id="stats">
    <div class="stat-card"><div class="stat-label">Leads (30d)</div><div class="stat-value" data-stat="total_30d">—</div></div>
    <div class="stat-card"><div class="stat-label">Urgentes sin contactar</div><div class="stat-value alert" data-stat="immediate_uncontacted">—</div><div class="stat-sub">intent=immediate · status=new</div></div>
    <div class="stat-card"><div class="stat-label">Tasa de cierre</div><div class="stat-value" data-stat="conversion_rate">—</div><div class="stat-sub">cerrados / total</div></div>
    <div class="stat-card"><div class="stat-label">Coche estrella (30d)</div><div class="stat-value" data-stat="top_vehicle">—</div><div class="stat-sub" data-stat="top_vehicle_count"></div></div>
  </section>

  <section class="filters">
    <div class="tab-row" id="statusTabs">
      <button class="tab active" data-status="all">Todos</button>
      <button class="tab" data-status="new">Nuevos</button>
      <button class="tab" data-status="contacted">Contactados</button>
      <button class="tab" data-status="qualified">Cualificados</button>
      <button class="tab" data-status="closed">Cerrados</button>
      <button class="tab" data-status="lost">Perdidos</button>
    </div>
    <div class="filters-divider"></div>
    <div class="tab-row" id="intentChips">
      <button class="chip active" data-intent="all">Toda intención</button>
      <button class="chip" data-intent="immediate">Comprar ahora</button>
      <button class="chip" data-intent="short_term">1-3 meses</button>
      <button class="chip" data-intent="exploring">Explorando</button>
    </div>
    <div class="filters-divider"></div>
    <input type="search" id="searchInput" placeholder="Buscar email o teléfono..." />
    <select id="rangeSelect">
      <option value="all">Todo el tiempo</option>
      <option value="7">Últimos 7 días</option>
      <option value="30">Últimos 30 días</option>
    </select>
  </section>

  <div class="table-wrap">
    <table class="leads">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Coche</th>
          <th>Contacto</th>
          <th>Intención</th>
          <th>Status</th>
          <th>UTM</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="leadsBody">
        <tr><td colspan="7" class="loader"><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></td></tr>
      </tbody>
    </table>
    <div class="pager">
      <span id="pagerInfo">—</span>
      <div>
        <button id="prevPage" disabled>Anterior</button>
        <button id="nextPage" disabled>Siguiente</button>
      </div>
    </div>
  </div>
</main>

<div class="drawer-overlay" id="drawerOverlay"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <button class="drawer-close" id="drawerClose" aria-label="Cerrar">×</button>
  <div id="drawerContent"></div>
</aside>

<script src="../js/config.js"></script>
<script src="../js/admin-dashboard.js"></script>
</body>
</html>
