<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Acceso · MT Lux Cars Admin</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #060606;
    --black-soft: #0F0F0F;
    --gold: #C9A84C;
    --gold-light: #E4C97A;
    --cream: #F0EAD6;
    --cream-soft: #D4CCBA;
    --gray: #888880;
  }
  html, body { height: 100%; }
  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%; max-width: 380px;
    padding: 2.4rem 2rem;
    background: var(--black-soft);
    border: 1px solid rgba(201,168,76,.18);
  }
  .eyebrow {
    font-size: .68rem; letter-spacing: .3em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: .6rem; text-align: center;
  }
  h1 {
    font-family: Georgia, serif;
    font-weight: 400; font-size: 1.5rem;
    color: var(--cream); margin-bottom: .2rem;
    text-align: center;
  }
  .sub {
    font-size: .82rem; color: var(--gray);
    margin-bottom: 1.6rem; text-align: center;
  }
  label { display: block; }
  .label-text {
    display: block; font-size: .7rem;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--cream-soft); margin-bottom: .35rem;
  }
  input[type="password"] {
    width: 100%; padding: .85rem 1rem;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(201,168,76,.18);
    color: var(--cream); font-family: inherit;
    font-size: .95rem; min-height: 44px;
    transition: border-color .25s ease, background .25s ease;
  }
  input[type="password"]:focus {
    outline: none; border-color: var(--gold);
    background: rgba(255,255,255,.05);
  }
  button {
    width: 100%; padding: .95rem;
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold); font-family: inherit;
    font-size: .82rem; letter-spacing: .16em;
    text-transform: uppercase; cursor: pointer;
    margin-top: 1.1rem; min-height: 44px;
    transition: background .35s ease, color .35s ease;
  }
  button:hover:not(:disabled) { background: var(--gold); color: var(--black); }
  button:disabled { opacity: .55; cursor: not-allowed; }
  .err {
    display: none; margin-top: 1rem; padding: .65rem .8rem;
    background: rgba(194,81,81,.1);
    border: 1px solid rgba(194,81,81,.4);
    color: #e8a4a4; font-size: .82rem;
  }
  .err.show { display: block; }
  .footer-note {
    text-align: center; margin-top: 1.6rem;
    font-size: .68rem; color: var(--gray); letter-spacing: .04em;
  }
</style>
</head>
<body>
<main class="card">
  <p class="eyebrow">MT Lux Cars</p>
  <h1>Panel interno</h1>
  <p class="sub">Acceso restringido</p>
  <form id="loginForm">
    <label>
      <span class="label-text">Contraseña</span>
      <input type="password" id="password" name="password" autocomplete="current-password" required autofocus>
    </label>
    <button type="submit" id="submitBtn">Entrar</button>
    <div class="err" id="errBox"></div>
  </form>
  <p class="footer-note">Acceso reservado al equipo</p>
</main>

<script src="../js/config.js"></script>
<script>
  (function () {
    "use strict";
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const errBox = document.getElementById('errBox');
    const pwd = document.getElementById('password');

    if (localStorage.getItem('mtlux_admin_token')) {
      window.location.replace('leads.html');
      return;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.remove('show');
      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = 'Comprobando...';

      try {
        const cfg = window.MTLUX_CONFIG;
        const res = await fetch(`${cfg.FUNCTIONS_URL}/admin-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd.value }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.token) {
          errBox.textContent = res.status === 401 ? 'Contraseña incorrecta.' : 'Error al iniciar sesión.';
          errBox.classList.add('show');
          btn.disabled = false;
          btn.textContent = original;
          pwd.value = '';
          pwd.focus();
          return;
        }
        localStorage.setItem('mtlux_admin_token', data.token);
        localStorage.setItem('mtlux_admin_exp', String(data.expires_at));
        window.location.replace('leads.html');
      } catch (err) {
        errBox.textContent = 'No se ha podido conectar.';
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = original;
      }
    });
  })();
</script>
</body>
</html>
